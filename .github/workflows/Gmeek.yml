name: build Gmeek

on:
  workflow_dispatch:
  issues:
    types: [opened, edited]
  schedule:
    - cron: "0 16 * * *"
    
jobs:
  build:
    name: Generate blog
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id || github.event_name == 'schedule' }}
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Get config.json
        run: |
          echo "====== check config.josn file ======"
          cat config.json
          echo "====== check config.josn end  ======"
          sudo apt-get install jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.8

      - name: Clone source code
        run: |
          GMEEK_VERSION=$(jq -r ".GMEEK_VERSION" config.json)
          git clone https://github.com/Meekdai/Gmeek.git /opt/Gmeek;
          cd /opt/Gmeek/
          lastTag=$(git describe --tags `git rev-list --tags --max-count=1`)
          if [ $GMEEK_VERSION == 'last' ]; then git checkout $lastTag; else git checkout $GMEEK_VERSION; fi;

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r /opt/Gmeek/requirements.txt

      - name: Generate new html
        run: |
          cp -r ./* /opt/Gmeek/
          cd /opt/Gmeek/
          python Gmeek.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }} --issue_number '${{ github.event.issue.number }}'

      - name: Keep custom homepage files
        run: |
          # Keep manually maintained homepage files from this repository.
          ROOT="${{ github.workspace }}"
          if [ ! -d "$ROOT/docs" ]; then
            echo "WARN: $ROOT/docs not found, skip custom homepage override."
            exit 0
          fi

          mkdir -p /opt/Gmeek/docs /opt/Gmeek/docs/assets

          if [ -f "$ROOT/docs/index.html" ]; then
            cp -f "$ROOT/docs/index.html" /opt/Gmeek/docs/index.html
          else
            echo "WARN: $ROOT/docs/index.html not found, skip."
          fi

          if [ -f "$ROOT/docs/tag.html" ]; then
            cp -f "$ROOT/docs/tag.html" /opt/Gmeek/docs/tag.html
          else
            echo "WARN: $ROOT/docs/tag.html not found, skip."
          fi

          if [ -f "$ROOT/docs/assets/theme.css" ]; then
            cp -f "$ROOT/docs/assets/theme.css" /opt/Gmeek/docs/assets/theme.css
          else
            echo "WARN: $ROOT/docs/assets/theme.css not found, skip."
          fi

          if [ -f "$ROOT/docs/assets/theme.js" ]; then
            cp -f "$ROOT/docs/assets/theme.js" /opt/Gmeek/docs/assets/theme.js
          else
            echo "WARN: $ROOT/docs/assets/theme.js not found, skip."
          fi

          if [ -f "$ROOT/docs/assets/GmeekTOC.js" ]; then
            cp -f "$ROOT/docs/assets/GmeekTOC.js" /opt/Gmeek/docs/assets/GmeekTOC.js
          else
            echo "WARN: $ROOT/docs/assets/GmeekTOC.js not found, skip."
          fi

      - name: Inject theme assets into generated post pages
        run: |
          POST_DIR="/opt/Gmeek/docs/post"
          if [ ! -d "$POST_DIR" ]; then
            echo "WARN: $POST_DIR not found, skip post asset injection."
            exit 0
          fi

          shopt -s nullglob
          for f in "$POST_DIR"/*.html; do
            if ! grep -q "../assets/theme.css" "$f"; then
              perl -0777 -i -pe "s#</head>#    <link href='../assets/theme.css' rel='stylesheet' />\\n</head>#s" "$f"
            fi

            if ! grep -q "../assets/theme.js" "$f"; then
              perl -0777 -i -pe "s#</body>#<script defer src='../assets/theme.js'></script>\\n</body>#s" "$f"
            fi

            echo "PATCHED: $f"
          done

      - name: Copy generated output back
        run: |
          cp -a /opt/Gmeek/docs ${{ github.workspace }} 
          cp -a /opt/Gmeek/backup ${{ github.workspace }} 
          cp /opt/Gmeek/blogBase.json ${{ github.workspace }} 

      - name: Lock custom homepage files before commit
        run: |
          # Never let generated output overwrite manually maintained homepage files.
          FILES=(
            "docs/index.html"
            "docs/tag.html"
            "docs/assets/theme.css"
            "docs/assets/theme.js"
            "docs/assets/GmeekTOC.js"
          )

          for f in "${FILES[@]}"; do
            if git cat-file -e "HEAD:$f" 2>/dev/null; then
              git checkout -- "$f"
              echo "LOCKED: $f"
            else
              echo "WARN: $f not tracked in HEAD, skip lock."
            fi
          done
          
      - name: update html
        run: |
          git config --local user.email "$(jq -r ".email" config.json)"
          git config --local user.name "${{ github.repository_owner }}"
          git add .
          git commit -a -m '🎉auto update by Gmeek action' || echo "nothing to commit"
          git push || echo "nothing to push"
          sleep 3
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/.'
          
  deploy:
    name: Deploy blog
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
